name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -count=1 ./...

      - name: Run tests with race detector
        run: go test -race -count=1 ./...

  docker:
    name: Docker build & self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t llm-http-proxy:ci .

      - name: Check image size
        run: docker images llm-http-proxy:ci --format "镜像大小: {{.Size}}"

      # 自验证:宿主机起 echo 后端,容器代理转发给它。
      # 容器经 host.docker.internal 回到宿主机(Linux 需 --add-host)。
      - name: Start local echo backend
        run: |
          python3 scripts/echo-backend.py &
          sleep 1
          curl -s http://127.0.0.1:8910/ping -d '{}' && echo " <- 后端就绪"

      - name: Run proxy container
        run: |
          docker run -d --name proxy-ci \
            --add-host=host.docker.internal:host-gateway \
            -p 18080:8080 \
            llm-http-proxy:ci
          sleep 2
          docker logs proxy-ci

      - name: Self-test through container
        run: bash scripts/docker-selftest.sh

      - name: Cleanup
        if: always()
        run: docker rm -f proxy-ci || true
