name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -count=1 ./...

      - name: Run tests with race detector
        run: go test -race -count=1 ./...

  docker:
    name: Docker build & self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t llm-http-proxy:ci .

      - name: Check image size
        run: docker images llm-http-proxy:ci --format "镜像大小: {{.Size}}"

      # 自验证方案:在宿主机起一个 echo 后端,容器里的代理转发给它。
      # 容器访问宿主机用 host.docker.internal(Linux 上需加 --add-host)。
      - name: Start local echo backend
        run: |
          # 用 Python 起一个回显服务,后台运行,监听 8910
          python3 - <<'PY' &
          import http.server, json
          class H(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  n = int(self.headers.get('Content-Length', 0))
                  body = self.rfile.read(n).decode() if n else ""
                  out = json.dumps({"method": self.command, "path": self.path, "body": body,
                                    "auth": self.headers.get("Authorization","")}).encode()
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(out)))
                  self.end_headers()
                  self.wfile.write(out)
              def do_GET(self):
                  self.do_POST()
              def log_message(self, *a): pass
          http.server.HTTPServer(("0.0.0.0", 8910), H).serve_forever()
          PY
          # 等后端就绪
          sleep 1
          curl -s http://127.0.0.1:8910/ping -d '{}' && echo " <- 后端就绪"

      - name: Run proxy container
        run: |
          docker run -d --name proxy-ci \
            --add-host=host.docker.internal:host-gateway \
            -p 18080:8080 \
            llm-http-proxy:ci
          sleep 2
          docker logs proxy-ci

      - name: Self-test through container
        run: |
          set -e
          # 经容器代理访问宿主机的 echo 后端。
          # 目标 URL 用 host.docker.internal,让容器能回到宿主机。
          RESP=$(curl -s "http://127.0.0.1:18080/http://host.docker.internal:8910/echo" \
            -H "Authorization: Bearer ci-secret-token" \
            -H "Content-Type: application/json" \
            -d '{"hello":"docker"}')
          echo "代理返回: $RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['method'] == 'POST', f'method 错: {d}'
          assert d['path'] == '/echo', f'path 错: {d}'
          assert d['auth'] == 'Bearer ci-secret-token', f'Authorization 未透传: {d}'
          assert d['body'] == '{\"hello\":\"docker\"}', f'body 错: {d}'
          print('✅ Docker 自验证通过: method/path/auth/body 全部正确透传')
          "

      - name: Cleanup
        if: always()
        run: docker rm -f proxy-ci || true
