name: Release

# 打 tag (v*) 时触发:构建多平台二进制 + 多架构 Docker 镜像
on:
  push:
    tags:
      - "v*"

# GHCR 推送需要写权限
permissions:
  contents: write   # 创建 GitHub Release
  packages: write   # 推送镜像到 GHCR

jobs:
  # --- Job 1: 多平台二进制 ---
  binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 拉完整历史,让 git describe 能工作

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p out
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          # version 用 git describe:tag 后有新提交会显示 v1.5.0-3-gabc1234
          VERSION=$(git describe --tags --always --dirty)
          echo "version: ${VERSION}"
          go build -trimpath -ldflags="-s -w \
            -X main.version=${VERSION} \
            -X main.buildTime=$(TZ=Asia/Shanghai date +%Y-%m-%dT%H:%M:%S%:z)" \
            -o "out/llm-http-proxy-${GOOS}-${GOARCH}${ext}" .

      - name: Package
        run: |
          cd out
          tar -czf "llm-http-proxy-${GOOS}-${GOARCH}.tar.gz" "llm-http-proxy-${GOOS}-${GOARCH}"
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: out/*.tar.gz

  # --- Job 2: 多架构 Docker 镜像 -> GHCR ---
  docker:
    name: Docker image -> GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # tag=v1.0.0 -> 镜像 tag: 1.0.0, latest
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Job 3: 收集二进制,创建 GitHub Release ---
  github-release:
    name: Create GitHub Release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
