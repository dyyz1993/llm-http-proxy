name: Deploy

# 部署策略:分阶段发布。
#   - jd:打 tag → Release 构建完成 → 本 workflow 自动部署(自动触发)
#   - jkj (NAS):仅手动触发(jd 验证 OK 后,在 Actions 页 Run workflow 并指定 tag)
#
# 这样可以"先发 jd,没问题再发 NAS",避免新版本同时上两台。
#
# 新增服务器:在 strategy.matrix.include 下加一条,并在 GitHub secret 里
# 配对应的 SSH 私钥(<NAME>_SSH_KEY)。IP/用户写在这里即可(不敏感)。
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "部署目标(留空=jd,填 jkj=只部署 NAS)"
        type: choice
        options:
          - jd
          - jkj
        default: jd
      tag:
        description: "要部署的 tag(如 v2.1.3,留空=最新 release)"
        required: false
        type: string

jobs:
  deploy:
    name: Deploy to ${{ matrix.name }}
    runs-on: ubuntu-latest
    # 自动触发(Release 完成)→ 部署 jd;手动触发且 target=jd → 也部署 jd
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'jd' || github.event_name == 'workflow_run' }}
    strategy:
      fail-fast: false   # 一台失败不影响其他台
      matrix:
        include:
          # --- 服务器 1: jd ---
          # host/user 留在 workflow(公网 VPS 地址不敏感,知道也连不上)
          # 真正敏感的 SSH key 在 secret(JD_SSH_KEY)
          - name: jd
            host: 36.151.142.174
            user: root
            port: 22
            arch: amd64
            ssh_key_secret: JD_SSH_KEY
          # --- 服务器 2: 新增服务器时取消注释并填写 ---
          # - name: <name>
          #   host: <ip>
          #   user: <user>
          #   port: 22
          #   arch: amd64     # 或 arm64
          #   ssh_key_secret: <NAME>_SSH_KEY
    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets[matrix.ssh_key_secret] }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf 'Host target\n  HostName %s\n  User %s\n  Port %s\n  IdentityFile ~/.ssh/deploy_key\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n  ConnectTimeout 25\n' "${{ matrix.host }}" "${{ matrix.user }}" "${{ matrix.port }}" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Test connectivity
        run: |
          echo "=== 测试连接 ${{ matrix.name }} ==="
          ssh target 'echo connected; hostname; uname -m'

      - name: Get tag (manual input or latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: tag
        run: |
          # 手动触发的 inputs.tag 优先;留空/自动触发则取最新 release
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "将部署 tag: $TAG"

      - name: Download binary
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          curl -fsSL -o /tmp/proxy.tar.gz \
            "https://github.com/${REPO}/releases/download/${TAG}/llm-http-proxy-linux-${{ matrix.arch }}.tar.gz"
          ls -lh /tmp/proxy.tar.gz

      - name: SCP and install
        run: |
          scp /tmp/proxy.tar.gz target:/tmp/proxy-ci.tar.gz
          ssh target 'set -e
            cd /tmp
            tar -xzf proxy-ci.tar.gz
            chmod 755 llm-http-proxy-linux-*
            mv llm-http-proxy-linux-* /usr/local/bin/llm-http-proxy
            rm proxy-ci.tar.gz
            echo "新版本: $(/usr/local/bin/llm-http-proxy -version)"
            systemctl restart llm-http-proxy || echo "systemctl 不可用,可能需要手动配置服务管理"
            sleep 2
            systemctl is-active llm-http-proxy 2>/dev/null && echo "服务已启动" || echo "(无 systemd 服务,请确认已配置)"'

      - name: Verify (retry until service ready)
        run: |
          echo "=== 内网验证 ${{ matrix.name }}(SSH 本地 curl,带重试) ==="
          # 服务重启后可能需要几秒才监听端口,最多重试 10 次(每次间隔 2s)
          ssh target 'for i in $(seq 1 10); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/__version 2>/dev/null)
            if [ "$CODE" = "200" ]; then
              echo "✅ HTTP 200 (第 ${i} 次尝试)"
              exit 0
            fi
            echo "  第 ${i} 次: HTTP $CODE,等待 2s 重试..."
            sleep 2
          done
          echo "❌ 服务启动超时"
          exit 1'

  # --- jkj 容器:进容器换二进制(不碰宿主机 docker) ---
  # 仅手动触发(jd 验证 OK 后再发 NAS),避免新版本同时上两台。
  deploy-jkj-box:
    name: Deploy to jkj box (in-container)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'jkj' }}
    steps:
      - name: Configure SSH (to container)
        env:
          SSH_KEY: ${{ secrets.JKJ_BOX_DEPLOY_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # 域名/端口不敏感(知道也连不上,密码/key 在 secret),写进 config
          printf 'Host jkj\n  HostName llm-ssh.19930810.xyz\n  Port 22022\n  User deploy\n  IdentityFile ~/.ssh/deploy_key\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n  ConnectTimeout 25\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Test connectivity
        run: |
          echo "=== 连接 jkj 容器(deploy) ==="
          ssh jkj 'echo connected; whoami; uname -m; /opt/proxy/llm-http-proxy -version'

      - name: Get tag (manual input or latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: tag
        run: |
          # 手动触发的 inputs.tag 优先;留空则取最新 release
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "将部署 tag: $TAG"

      - name: Deploy binary (try in-container curl with retry, fallback to scp+gzip)
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          RAW_ARCH=$(ssh jkj 'uname -m')
          case "${RAW_ARCH}" in
            x86_64)  ARCH="amd64" ;;
            aarch64) ARCH="arm64" ;;
          esac
          URL="https://github.com/${REPO}/releases/download/${TAG}/llm-http-proxy-linux-${ARCH}.tar.gz"

          # 策略 1: 容器内有 curl 时,容器内直接下载(带 retry + 断点续传)
          # NAS 到 GitHub 网络不稳定,用 -C - 断点续传 + --retry 多次重试
          if ssh jkj 'command -v curl >/dev/null 2>&1'; then
            echo "=== 容器内 curl 下载 ${TAG} (${ARCH}, 带 retry + 断点续传) ==="
            if ssh jkj "set -e
              rm -f /tmp/proxy.tar.gz
              # --retry 5: 最多重试 5 次
              # --retry-delay 5: 每次重试间隔 5 秒
              # --retry-all-errors: 任何错误都重试(含超时)
              # -C -: 断点续传(配合 --retry,断线后从上次位置继续)
              # --max-time 600: 单次最长 10 分钟(3.7MB 在慢网络也够)
              curl -fL --retry 5 --retry-delay 5 --retry-all-errors -C - --max-time 600 -o /tmp/proxy.tar.gz '${URL}'
              cd /tmp && tar -xzf proxy.tar.gz && rm proxy.tar.gz
              mv llm-http-proxy-linux-${ARCH} /opt/proxy/llm-http-proxy
              chmod 755 /opt/proxy/llm-http-proxy
              chown deploy:deploy /opt/proxy/llm-http-proxy
              echo '新版本:' \$(/opt/proxy/llm-http-proxy -version)
              supervisorctl restart llm-http-proxy
              sleep 1
              supervisorctl status llm-http-proxy"; then
              echo "=== 策略 1(容器内 curl)成功 ==="
            else
              echo "⚠️ 策略 1 失败,fallback 到策略 2(runner 下载 + scp)"
              rm -f /tmp/proxy.tar.gz llm-http-proxy-linux-${ARCH}
              # 策略 2: runner 下载(GitHub 网内,快)+ scp 到容器
              curl -fsSL --retry 3 --max-time 120 -o /tmp/proxy.tar.gz "${URL}"
              tar -xzf /tmp/proxy.tar.gz
              gzip -c llm-http-proxy-linux-${ARCH} > /tmp/proxy.gz
              echo "传输大小: $(ls -lh /tmp/proxy.gz | awk '{print $5}')(gzip 压缩后)"
              scp /tmp/proxy.gz jkj:/tmp/proxy.gz
              ssh jkj 'set -e
                gunzip -f /tmp/proxy.gz
                mv /tmp/proxy /opt/proxy/llm-http-proxy
                chmod 755 /opt/proxy/llm-http-proxy
                chown deploy:deploy /opt/proxy/llm-http-proxy
                echo "新版本: $(/opt/proxy/llm-http-proxy -version)"
                supervisorctl restart llm-http-proxy
                sleep 1
                supervisorctl status llm-http-proxy'
            fi
          else
            # 容器无 curl:直接用策略 2(runner 下载 + scp+gzip)
            echo "=== 容器无 curl,scp+gzip 下载 ${TAG} (${ARCH}) ==="
            curl -fsSL --retry 3 --max-time 120 -o /tmp/proxy.tar.gz "${URL}"
            tar -xzf /tmp/proxy.tar.gz
            gzip -c llm-http-proxy-linux-${ARCH} > /tmp/proxy.gz
            echo "传输大小: $(ls -lh /tmp/proxy.gz | awk '{print $5}')(gzip 压缩后)"
            scp /tmp/proxy.gz jkj:/tmp/proxy.gz
            ssh jkj 'set -e
              gunzip -f /tmp/proxy.gz
              mv /tmp/proxy /opt/proxy/llm-http-proxy
              chmod 755 /opt/proxy/llm-http-proxy
              chown deploy:deploy /opt/proxy/llm-http-proxy
              echo "新版本: $(/opt/proxy/llm-http-proxy -version)"
              supervisorctl restart llm-http-proxy
              sleep 1
              supervisorctl status llm-http-proxy'
          fi

      - name: Verify
        run: |
          echo "=== 公网验证 jkj 代理 ==="
          curl -sk -o /dev/null -w "HTTP %{http_code} %{time_total}s\n" "https://p.19930810.xyz:8443/__version"
