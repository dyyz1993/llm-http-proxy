name: Deploy

# 打 tag(release 完成后)自动同时部署到所有配置的服务器,也可手动触发。
#
# 新增服务器:在 strategy.matrix.include 下加一条,并在 GitHub secret 里
# 配对应的 SSH 私钥(<NAME>_SSH_KEY)。IP/用户写在这里即可(不敏感)。
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: ["v*"]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false   # 一台失败不影响其他台
      matrix:
        include:
          # --- 服务器 1: jd ---
          # host/user 在 secret 里(JD_HOST/JD_USER),不写进仓库
          - name: jd
            host_secret: JD_HOST
            user_secret: JD_USER
            port: 22
            arch: amd64
            ssh_key_secret: JD_SSH_KEY
          # --- 服务器 2: 新增服务器时取消注释并填写 ---
          # - name: <name>
          #   host: <ip>
          #   user: <user>
          #   port: 22
          #   arch: amd64     # 或 arm64
          #   ssh_key_secret: <NAME>_SSH_KEY
    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets[matrix.ssh_key_secret] }}
          TARGET_HOST: ${{ secrets[matrix.host_secret] }}
          TARGET_USER: ${{ secrets[matrix.user_secret] }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf 'Host target\n  HostName %s\n  User %s\n  Port %s\n  IdentityFile ~/.ssh/deploy_key\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n  ConnectTimeout 25\n' "$TARGET_HOST" "$TARGET_USER" "${{ matrix.port }}" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Test connectivity
        run: |
          echo "=== 测试连接 ${{ matrix.name }} ==="
          ssh target 'echo connected; hostname; uname -m'

      - name: Get latest release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: tag
        run: |
          TAG=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download binary
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          curl -fsSL -o /tmp/proxy.tar.gz \
            "https://github.com/${REPO}/releases/download/${TAG}/llm-http-proxy-linux-${{ matrix.arch }}.tar.gz"
          ls -lh /tmp/proxy.tar.gz

      - name: SCP and install
        run: |
          scp /tmp/proxy.tar.gz target:/tmp/proxy-ci.tar.gz
          ssh target 'set -e
            cd /tmp
            tar -xzf proxy-ci.tar.gz
            chmod 755 llm-http-proxy-linux-*
            mv llm-http-proxy-linux-* /usr/local/bin/llm-http-proxy
            rm proxy-ci.tar.gz
            echo "新版本: $(/usr/local/bin/llm-http-proxy -version)"
            systemctl restart llm-http-proxy || echo "systemctl 不可用,可能需要手动配置服务管理"
            sleep 2
            systemctl is-active llm-http-proxy 2>/dev/null && echo "服务已启动" || echo "(无 systemd 服务,请确认已配置)"'

      - name: Verify
        env:
          HOST: ${{ secrets[matrix.host_secret] }}
        run: |
          echo "=== 公网验证 ${{ matrix.name }} ==="
          curl -s -o /dev/null -w "HTTP %{http_code} 耗时 %{time_total}s\n" \
            "http://${HOST}:8080/__version"

  # --- jkj 容器:进容器换二进制(不碰宿主机 docker) ---
  deploy-jkj-box:
    name: Deploy to jkj box (in-container)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Configure SSH (to container)
        env:
          SSH_KEY: ${{ secrets.JKJ_BOX_DEPLOY_KEY }}
          BOX_HOST: ${{ secrets.JKJ_BOX_HOST }}
          BOX_PORT: ${{ secrets.JKJ_BOX_PORT }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf 'Host jkj\n  HostName %s\n  Port %s\n  User deploy\n  IdentityFile ~/.ssh/deploy_key\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n  ConnectTimeout 25\n' "$BOX_HOST" "$BOX_PORT" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Test connectivity
        run: |
          echo "=== 连接 jkj 容器(deploy) ==="
          ssh jkj 'echo connected; whoami; uname -m; /opt/proxy/llm-http-proxy -version'

      - name: Get latest release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: tag
        run: |
          TAG=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download and deploy binary
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          RAW_ARCH=$(ssh jkj 'uname -m')
          case "${RAW_ARCH}" in
            x86_64)  ARCH="amd64" ;;
            aarch64) ARCH="arm64" ;;
          esac
          echo "=== 下载 ${TAG} 的 linux-${ARCH} 二进制 ==="
          curl -fsSL -o /tmp/proxy.tar.gz \
            "https://github.com/${REPO}/releases/download/${TAG}/llm-http-proxy-linux-${ARCH}.tar.gz"
          tar -xzf /tmp/proxy.tar.gz
          echo "=== scp 到容器 /tmp ==="
          scp "llm-http-proxy-linux-${ARCH}" jkj:/tmp/llm-http-proxy-new
          echo "=== 替换 + 重启(CI 不碰宿主机,只在容器内)==="
          ssh jkj 'set -e
            mv /tmp/llm-http-proxy-new /opt/proxy/llm-http-proxy
            chmod 755 /opt/proxy/llm-http-proxy
            chown deploy:deploy /opt/proxy/llm-http-proxy
            echo "新版本: $(/opt/proxy/llm-http-proxy -version)"
            supervisorctl restart llm-http-proxy
            sleep 1
            supervisorctl status llm-http-proxy'

      - name: Verify
        env:
          PROXY_HOST: ${{ secrets.JKJ_PROXY_HOST }}
          PROXY_PORT: ${{ secrets.JKJ_PROXY_PORT }}
        run: |
          echo "=== 公网验证 jkj 代理 ==="
          curl -sk -o /dev/null -w "HTTP %{http_code} %{time_total}s\n" "https://${PROXY_HOST}:${PROXY_PORT}/__version"
