name: Deploy to jd

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: ["v*"]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to jd server
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Configure SSH and test
        env:
          SSH_KEY: ${{ secrets.JD_SSH_KEY }}
          JD_HOST: ${{ secrets.JD_HOST }}
          JD_USER: ${{ secrets.JD_USER }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/jd_deploy_key
          chmod 600 ~/.ssh/jd_deploy_key
          ssh-keygen -lf ~/.ssh/jd_deploy_key
          # 写 ssh config:用 printf 避免 heredoc 缩进问题
          {
            printf 'Host jd\n'
            printf '  HostName %s\n' "$JD_HOST"
            printf '  User %s\n' "$JD_USER"
            printf '  IdentityFile ~/.ssh/jd_deploy_key\n'
            printf '  StrictHostKeyChecking no\n'
            printf '  UserKnownHostsFile /dev/null\n'
            printf '  ConnectTimeout 25\n'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config
          echo "--- 测试连接 ---"
          ssh jd 'echo CI-OK; hostname; /usr/local/bin/llm-http-proxy -version'

      - name: Get latest release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: tag
        run: |
          TAG=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download and deploy
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          curl -fsSL -o /tmp/proxy.tar.gz \
            "https://github.com/${REPO}/releases/download/${TAG}/llm-http-proxy-linux-amd64.tar.gz"
          scp /tmp/proxy.tar.gz jd:/tmp/proxy-ci.tar.gz
          ssh jd 'set -e
            cd /tmp
            tar -xzf proxy-ci.tar.gz
            chmod 755 llm-http-proxy-linux-amd64
            mv llm-http-proxy-linux-amd64 /usr/local/bin/llm-http-proxy
            rm proxy-ci.tar.gz
            echo "新版本: $(/usr/local/bin/llm-http-proxy -version)"
            systemctl restart llm-http-proxy
            sleep 2
            echo "状态: $(systemctl is-active llm-http-proxy)"'

      - name: Verify
        env:
          JD_HOST: ${{ secrets.JD_HOST }}
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}\n" "http://${JD_HOST}:8080/__stats"
