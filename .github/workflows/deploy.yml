name: Deploy to jd

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: ["v*"]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to jd server
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.JD_SSH_KEY }}
          HOST: ${{ secrets.JD_HOST }}
          JD_USER: ${{ secrets.JD_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/jd_deploy_key
          chmod 600 ~/.ssh/jd_deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          {
            echo "Host jd"
            echo "  HostName ${HOST}"
            echo "  User ${JD_USER}"
            echo "  IdentityFile ~/.ssh/jd_deploy_key"
            echo "  StrictHostKeyChecking no"
            echo "  UserKnownHostsFile ~/.ssh/known_hosts"
            echo "  ConnectTimeout 25"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config
          echo "=== ssh config ==="
          cat ~/.ssh/config

      - name: Test connectivity
        run: |
          echo "=== 测试 SSH 连接到 jd ==="
          ssh jd "echo CI-connected; hostname; /usr/local/bin/llm-http-proxy -version"

      - name: Get latest release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: tag
        run: |
          TAG=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "最新 release tag: $TAG"

      - name: Download binary to runner
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          echo "=== 下载 ${TAG} 的 linux-amd64 二进制 ==="
          curl -fsSL -o /tmp/proxy.tar.gz \
            "https://github.com/${REPO}/releases/download/${TAG}/llm-http-proxy-linux-amd64.tar.gz"
          ls -lh /tmp/proxy.tar.gz

      - name: SCP binary to jd
        run: |
          echo "=== 推送二进制到 jd ==="
          scp /tmp/proxy.tar.gz jd:/tmp/proxy-ci.tar.gz

      - name: Install and restart on jd
        run: |
          echo "=== 解压、替换、重启 ==="
          ssh jd 'set -e
            cd /tmp
            tar -xzf proxy-ci.tar.gz
            chmod 755 llm-http-proxy-linux-amd64
            mv llm-http-proxy-linux-amd64 /usr/local/bin/llm-http-proxy
            rm proxy-ci.tar.gz
            echo "新版本: $(/usr/local/bin/llm-http-proxy -version)"
            systemctl restart llm-http-proxy
            sleep 2
            echo "服务状态: $(systemctl is-active llm-http-proxy)"
            curl -s -o /dev/null -w "本地健康检查 HTTP %{http_code}\n" http://localhost:8080/'

      - name: Verify from runner
        env:
          HOST: ${{ secrets.JD_HOST }}
        run: |
          echo "=== 从 runner 公网验证 ==="
          curl -s -o /dev/null -w "HTTP %{http_code} 耗时 %{time_total}s\n" \
            "http://${HOST}:8080/__stats"
