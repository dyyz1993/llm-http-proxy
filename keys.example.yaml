# keys.yaml — 代理 key 配置文件
#
# 格式: alias → 配置,alias 是简短的标识,如 glm、claude、deepseek。
# 管理后台用 alias 区分统计,日志用 alias 标识来源。
#
# 所有拦截器参数支持三种设置方式(优先级高→低):
#   1. alias 直接写字段
#   2. override 覆盖
#   3. Profile 模板(interceptor_profiles 段定义)

# === 拦截器模板(可选)=====================================================
# 多个 alias 共用一套规则时,定义模板然后引用,避免重复。
# 没有显式 profile 的 alias 自动用 "default" 模板(如果定义了)。
# 模板中的参数可以被 alias 的 override 或直接字段覆盖。

interceptor_profiles:
  # 默认模板:所有没有 profile 的 alias 自动使用
  default:
    rate: 60              # 每分钟最多 60 次
    burst: 10             # 突发上限 10
    max_tokens: 10000000  # 每 24h 最多 1 千万 token
    max_requests: 5000    # 每 24h 最多 5000 次请求
    window: 24h           # 窗口期

  # 夜间关闭:22:00~08:00 禁止访问
  night_block:
    rate: 30
    max_tokens: 5000000
    max_requests: 2000
    window: 12h
    time_block:
      start: "22:00"
      end: "08:00"

  # 严格模式:高频限制+窄窗口
  strict:
    rate: 20
    burst: 3
    max_tokens: 1000000
    max_requests: 500
    window: 1h

# === Key 配置 ============================================================

# 简单用法:用 default 模板(自动),只写 key
glm:
  key: "你的GLM真实key"

# 引用模板 + 覆盖部分参数
max-0:
  key: "你的max0 key"
  profile: night_block
  override:
    max_tokens: 2000000   # 只改 token 上限,其他用 night_block

# 完全手动:不引用模板,所有参数 inline
qingdengxuejie:
  key: "你的qingdengxuejie key"
  rate: 30
  max_tokens: 5000000
  max_requests: 2000
  window: 12h
  time_block:
    start: "23:00"
    end: "07:00"

# 无限制:不加任何参数 = 不限流不限量
claude:
  key: "你的Claude key"

# 指定 header(自动检测不对时手动指定):
deepseek:
  key: "你的DeepSeek key"
  header: Authorization
  prefix: "Bearer "

# 有效期(过期后返回 410):
trial:
  key: "sk-trial"
  expires: "2026-12-31"

# === 全局规则(非 alias 级别)==============================================

# Token 用量乘数(匹配模型名+域名,命中后用量和费用×N):
# 详见 USAGE.md

